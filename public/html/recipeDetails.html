<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Details</title>

  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <h2>Recipe Details</h2>

    <div class="nav-links">

      <a href="/home">Home</a>

      <a href="/favorites">Favorites</a>

      <a href="/collections">Collections</a>

      <button id="logoutBtn">
        Logout
      </button>

    </div>

  </nav>


  <!-- RECIPE DETAILS -->

  <section class="recipe-detail-container">

    <div id="recipeDetails">

    </div>

    <div id="createdBySection" class="created-by-section">

    </div>

  </section>


  <!-- REVIEW SECTION -->

  <section class="review-section">

    <h2>Reviews</h2>

    <div id="reviewsContainer">

    </div>

  </section>
  <section class="add-collection-section">
  <h2>Add Recipe To Collection</h2>

  <div class="form-group">
    <label>Select Collection</label>

    <select id="collectionSelect">
      <option value="">Select Collection</option>
    </select>
  </div>

  <button id="addToCollectionBtn">
    Add To Collection
  </button>
</section>


  <!-- ADD REVIEW -->

  <section class="add-review-section">

    <h2>Add Review</h2>

    <form id="reviewForm">

      <div class="form-group">

        <label>Rating</label>

        <select id="rating" required>

          <option value="">
            Select Rating
          </option>

          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>

        </select>

      </div>

      <div class="form-group">

        <label>Comment</label>

        <textarea
          id="comment"
          required
        ></textarea>

      </div>

      <button type="submit">
        Add Review
      </button>

    </form>

  </section>


  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script src="../js/recipeDetail.js"></script>

</body>
</html>
