<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Recipe</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="navbar">
    <h2>Recipe App</h2>
    <div class="nav-links">
      <a href="/home">Home</a>
      <a href="/my-recipes">My Recipes</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1>Create Recipe</h1>

    <form id="createRecipeForm">

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="title" required>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="description" required></textarea>
      </div>

      <div class="form-group">
        <label>Ingredients</label>
        <textarea id="ingredients" required></textarea>
      </div>

      <div class="form-group">
        <label>Instructions</label>
        <textarea id="instructions" required></textarea>
      </div>

      <div class="form-group">
        <label>Cooking Time</label>
        <input type="number" id="cookingTime" required>
      </div>

      <div class="form-group">
        <label>Servings</label>
        <input type="text" id="servings" required>
      </div>

      <div class="form-group">
        <label>Difficulty</label>
        <select id="difficulty" required>
          <option value="">Select Difficulty</option>
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <div class="form-group">
        <label>Diet Type</label>
        <select id="dietType" required>
          <option value="">Select Diet Type</option>
          <option value="veg">Veg</option>
          <option value="non-veg">Non Veg</option>
        </select>
      </div>

      <div class="form-group">
        <label>Prep Time</label>
        <input type="number" id="prepTime" required>
      </div>

      <div class="form-group">
        <label>Category</label>
        <input type="text" id="category" required>
      </div>

      <div class="form-group">
        <label>Recipe Image</label>
        <input type="file" id="recipeImage" accept="image/*" required>
      </div>

      <button type="submit">Create Recipe</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../js/createRecipe.js"></script>

</body>
</html>
